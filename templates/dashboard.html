<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CharlieChat | Dashboard</title>
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#63a8ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CharlieChat" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
            },
            colors: {
              pitch: "#05070b",
              panel: "#0b1017",
              line: "#1d2633",
              ink: "#eff5eb",
              muted: "#90a0b8",
              accent: "#63a8ff",
              accentSoft: "#111b28",
              danger: "#ff8b8b",
            },
            boxShadow: {
              glow: "0 0 0 1px rgba(99,168,255,0.14), 0 30px 90px rgba(0,0,0,0.45)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="h-[100dvh] overflow-hidden bg-pitch font-sans text-ink">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(99,168,255,0.12),_transparent_22%),linear-gradient(180deg,_#05070b,_#0a1118_55%,_#05070b)]"></div>
    <div class="absolute inset-0 -z-10 bg-[linear-gradient(rgba(99,168,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(99,168,255,0.05)_1px,transparent_1px)] bg-[size:40px_40px] [mask-image:linear-gradient(180deg,white,transparent_85%)]"></div>

    <div id="mobileBackdrop" class="pointer-events-none fixed inset-0 z-30 bg-black/60 opacity-0 transition xl:hidden"></div>

    <main class="mx-auto flex h-[100dvh] max-w-7xl flex-col overflow-hidden px-4 py-4 md:px-8 md:py-8">
      <header class="mb-4 flex items-center justify-between gap-3 rounded-[1.5rem] border border-line bg-panel/90 px-4 py-3 shadow-glow backdrop-blur md:mb-6 md:px-5 md:py-4">
        <div class="flex items-center gap-3">
          <button
            id="overviewToggle"
            type="button"
            class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-line bg-black/20 text-ink transition hover:border-accent hover:text-accent xl:hidden"
            aria-label="Open menu"
          >
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16"/>
            </svg>
          </button>
          <img src="/logo.png" alt="CharlieChat" class="h-11 w-11 object-contain" />
          <h1 class="text-xl font-bold text-ink md:text-2xl">CharlieChat</h1>
        </div>
        <div class="flex flex-wrap items-center justify-end gap-2 md:gap-3">
          <div id="deviceChip" class="hidden items-center gap-3 rounded-full border border-line bg-black/20 px-3 py-2 text-sm text-muted">
            <img id="deviceChipImage" alt="" class="h-8 w-8 rounded-full object-cover" />
            <div class="flex items-center gap-2">
              <span id="deviceChipDot" class="h-2.5 w-2.5 rounded-full bg-line"></span>
              <span id="deviceChipLabel"></span>
            </div>
          </div>
          <button
            id="notificationToggle"
            type="button"
            class="relative inline-flex h-11 w-11 items-center justify-center rounded-full border border-line bg-black/20 text-ink transition hover:border-accent hover:text-accent"
            aria-label="Notifications"
          >
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5m6 0a3 3 0 1 1-6 0m6 0H9"/>
            </svg>
            <span id="notificationCount" class="absolute -right-1 -top-1 hidden min-w-[1.25rem] rounded-full bg-accent px-1.5 py-0.5 text-[10px] font-bold leading-none text-black">0</span>
          </button>
          <div class="hidden rounded-full border border-line bg-black/20 px-4 py-2 text-sm text-muted lg:block">{{ email }}</div>
          <button
            id="logoutButton"
            type="button"
            class="rounded-full border border-line bg-black/20 px-4 py-2 text-sm font-semibold text-ink transition hover:border-accent hover:text-accent"
          >
            Sign out
          </button>
        </div>
      </header>

      <section class="relative flex min-h-0 flex-1 gap-4 md:gap-6">
        <aside id="overviewPanel" class="fixed inset-y-0 left-0 z-40 flex w-[88vw] max-w-sm -translate-x-full flex-col overflow-hidden border-r border-line bg-panel/95 p-5 shadow-glow backdrop-blur transition-transform duration-300 xl:static xl:z-auto xl:w-[360px] xl:max-w-none xl:translate-x-0 xl:rounded-[1.75rem] xl:border xl:border-line">
          <div id="sidebarScroll" class="flex-1 space-y-4 overflow-y-auto pr-1">
            <div class="mb-1 flex items-start justify-between gap-3">
              <div>
                <p class="text-xs uppercase tracking-[0.45em] text-muted">Signals</p>
                <h2 class="mt-3 text-2xl font-bold">Garmin overview</h2>
              </div>
              <div class="flex items-center gap-2">
                <button
                  id="refreshOverviewButton"
                  type="button"
                  class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-line bg-black/20 text-muted transition hover:border-accent hover:text-accent"
                  aria-label="Refresh Garmin data"
                >
                  <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6"/>
                  </svg>
                </button>
                <button
                  id="closeOverviewButton"
                  type="button"
                  class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-line bg-black/20 text-muted transition hover:border-accent hover:text-accent xl:hidden"
                  aria-label="Close overview"
                >
                  <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6L6 18"/>
                  </svg>
                </button>
              </div>
            </div>

            <section class="rounded-[1.5rem] border border-line bg-black/20 p-4">
              <div>
                <p class="text-xs uppercase tracking-[0.35em] text-accent">Current metrics</p>
              </div>
              <div id="metricList" class="mt-4 grid gap-2"></div>
            </section>

            <section class="rounded-[1.5rem] border border-line bg-black/20 p-4">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <p class="text-xs uppercase tracking-[0.35em] text-accent">History</p>
                  <p id="historyMeta" class="mt-2 text-sm leading-6 text-muted">Waiting for Garmin history coverage...</p>
                </div>
                <button
                  id="syncHistoryButton"
                  type="button"
                  class="rounded-full border border-accent/20 bg-accent/10 px-4 py-2 text-xs font-bold text-accent transition hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-60"
                >
                  Sync 12m
                </button>
              </div>
            </section>

            <div id="shortcutList" class="space-y-3">
              <div class="rounded-[1.5rem] border border-line bg-black/20 px-4 py-4 text-sm text-muted">Loading shortcuts...</div>
            </div>
          </div>

          <div id="warningBox" class="mt-4 hidden rounded-[1.5rem] border border-accent/20 bg-accent/8 px-4 py-3 text-sm leading-6 text-accent"></div>

          <p id="messageBox" class="mt-4 min-h-[3rem] rounded-[1.5rem] border border-line bg-black/20 px-4 py-3 text-sm leading-6 text-muted">
            Ask a question or use a shortcut.
          </p>
        </aside>

        <section class="flex min-h-0 flex-1 flex-col rounded-[1.75rem] border border-line bg-panel/90 p-4 shadow-glow md:p-6">
          <div class="mb-4 flex items-center justify-between gap-3">
            <div class="inline-flex rounded-full border border-line bg-black/20 p-1">
              <button id="chatTabButton" type="button" class="rounded-full bg-accent px-4 py-2 text-sm font-semibold text-black transition">Chat</button>
              <button id="analyticsTabButton" type="button" class="rounded-full px-4 py-2 text-sm font-semibold text-muted transition hover:text-ink">Analytics</button>
            </div>
            <button
              id="clearChat"
              type="button"
              class="rounded-full border border-line bg-black/20 px-4 py-2 text-sm font-semibold text-ink transition hover:border-accent hover:text-accent"
            >
              Clear
            </button>
          </div>

          <div id="chatView" class="flex min-h-0 flex-1 flex-col">
            <div id="chatThread" class="flex-1 space-y-4 overflow-y-auto scroll-smooth rounded-[1.5rem] border border-line bg-black/30 p-4 md:p-5"></div>

            <form id="chatForm" class="mt-4 flex flex-col gap-3 md:flex-row">
              <input
                id="chatInput"
                type="text"
                name="question"
                placeholder="Ask Charlie anything about your Garmin data..."
                class="w-full rounded-[1.25rem] border border-line bg-black/20 px-4 py-4 text-base text-ink outline-none transition placeholder:text-muted focus:border-accent"
                autocomplete="off"
                required
              />
              <button
                id="sendButton"
                type="submit"
                class="rounded-[1.25rem] bg-accent px-5 py-4 text-sm font-bold text-black transition hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-60"
              >
                Ask Charlie
              </button>
            </form>
          </div>

          <div id="analyticsView" class="hidden min-h-0 flex-1 flex-col">
            <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
              <div class="inline-flex rounded-full border border-line bg-black/20 p-1">
                <button data-range="7d" class="analytics-range rounded-full bg-accent px-3 py-1.5 text-xs font-semibold text-black">7d</button>
                <button data-range="30d" class="analytics-range rounded-full px-3 py-1.5 text-xs font-semibold text-muted transition hover:text-ink">30d</button>
                <button data-range="90d" class="analytics-range rounded-full px-3 py-1.5 text-xs font-semibold text-muted transition hover:text-ink">90d</button>
                <button data-range="12m" class="analytics-range rounded-full px-3 py-1.5 text-xs font-semibold text-muted transition hover:text-ink">12m</button>
              </div>
              <div id="analyticsMeta" class="text-sm text-muted"></div>
            </div>
            <div id="analyticsInsights" class="grid gap-3 md:grid-cols-2"></div>
            <div id="analyticsCharts" class="mt-4 grid min-h-0 flex-1 gap-4 overflow-y-auto pr-1 md:grid-cols-2"></div>
          </div>
        </section>
      </section>
    </main>

    <aside id="notificationPanel" class="pointer-events-none fixed inset-y-0 right-0 z-40 flex w-[92vw] max-w-md translate-x-full flex-col border-l border-line bg-panel/95 p-4 shadow-glow backdrop-blur transition-transform duration-300 md:p-5">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-xs uppercase tracking-[0.35em] text-accent">Notifications</p>
          <h2 class="mt-2 text-2xl font-bold text-ink">Daily overview</h2>
          <p class="mt-2 text-sm leading-6 text-muted">Unread insights first, then saved history by day.</p>
        </div>
        <button
          id="closeNotificationsButton"
          type="button"
          class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-line bg-black/20 text-muted transition hover:border-accent hover:text-accent"
          aria-label="Close notifications"
        >
          <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <div id="notificationList" class="mt-6 space-y-3"></div>
      <div id="notificationHistory" class="mt-4 flex-1 space-y-3 overflow-y-auto pr-1"></div>
    </aside>

    <script>
      const messageBox = document.getElementById("messageBox");
      const warningBox = document.getElementById("warningBox");
      const mobileBackdrop = document.getElementById("mobileBackdrop");
      const overviewPanel = document.getElementById("overviewPanel");
      const notificationPanel = document.getElementById("notificationPanel");
      const overviewToggle = document.getElementById("overviewToggle");
      const closeOverviewButton = document.getElementById("closeOverviewButton");
      const notificationToggle = document.getElementById("notificationToggle");
      const closeNotificationsButton = document.getElementById("closeNotificationsButton");
      const notificationCount = document.getElementById("notificationCount");
      const notificationList = document.getElementById("notificationList");
      const notificationHistory = document.getElementById("notificationHistory");
      const chatTabButton = document.getElementById("chatTabButton");
      const analyticsTabButton = document.getElementById("analyticsTabButton");
      const chatView = document.getElementById("chatView");
      const analyticsView = document.getElementById("analyticsView");
      const analyticsMeta = document.getElementById("analyticsMeta");
      const analyticsInsights = document.getElementById("analyticsInsights");
      const analyticsCharts = document.getElementById("analyticsCharts");
      const shortcutList = document.getElementById("shortcutList");
      const metricList = document.getElementById("metricList");
      const historyMeta = document.getElementById("historyMeta");
      const syncHistoryButton = document.getElementById("syncHistoryButton");
      const refreshOverviewButton = document.getElementById("refreshOverviewButton");
      const deviceChip = document.getElementById("deviceChip");
      const deviceChipImage = document.getElementById("deviceChipImage");
      const deviceChipDot = document.getElementById("deviceChipDot");
      const deviceChipLabel = document.getElementById("deviceChipLabel");
      const chatThread = document.getElementById("chatThread");
      const chatForm = document.getElementById("chatForm");
      const chatInput = document.getElementById("chatInput");
      const sendButton = document.getElementById("sendButton");
      const logoutButton = document.getElementById("logoutButton");
      let analyticsPayload = null;
      let activeAnalyticsRange = "30d";

      function setMessage(text, tone = "neutral") {
        const tones = {
          neutral: "border border-line bg-black/20 text-muted",
          success: "border border-accent/20 bg-accent/10 text-accent",
          error: "border border-red-500/20 bg-red-500/10 text-danger",
        };
        messageBox.className = `mt-4 min-h-[3rem] rounded-[1.5rem] px-4 py-3 text-sm leading-6 ${tones[tone] || tones.neutral}`;
        messageBox.textContent = text;
      }

      function setWarnings(warnings = []) {
        if (!warnings.length) {
          warningBox.classList.add("hidden");
          warningBox.textContent = "";
          return;
        }
        warningBox.classList.remove("hidden");
        warningBox.textContent = warnings.join(" | ");
      }

      async function safeJson(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || data.message || "Request failed.");
        }
        return data;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function renderMessageContent(value) {
        return String(value || "")
          .split(/\n{2,}/)
          .map((paragraph) => `<p>${escapeHtml(paragraph).replaceAll("\n", "<br />")}</p>`)
          .join("");
      }

      function formatDateRo(value) {
        if (!value) {
          return "";
        }
        const dateValue = new Date(`${value}T00:00:00`);
        return new Intl.DateTimeFormat("ro-RO", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        }).format(dateValue);
      }

      function scrollChatToBottom(smooth = true) {
        requestAnimationFrame(() => {
          chatThread.scrollTo({
            top: chatThread.scrollHeight,
            behavior: smooth ? "smooth" : "auto",
          });
        });
      }

      function setMobileBackdrop(visible) {
        mobileBackdrop.classList.toggle("pointer-events-none", !visible);
        mobileBackdrop.classList.toggle("opacity-0", !visible);
        mobileBackdrop.classList.toggle("opacity-100", visible);
      }

      function openOverviewPanel() {
        closeNotificationPanel();
        overviewPanel.classList.remove("-translate-x-full");
        setMobileBackdrop(true);
      }

      function closeOverviewPanel() {
        overviewPanel.classList.add("-translate-x-full");
        if (notificationPanel.classList.contains("translate-x-full")) {
          setMobileBackdrop(false);
        }
      }

      function openNotificationPanel() {
        closeOverviewPanel();
        notificationPanel.classList.remove("translate-x-full", "pointer-events-none");
        setMobileBackdrop(true);
      }

      function closeNotificationPanel() {
        notificationPanel.classList.add("translate-x-full", "pointer-events-none");
        if (overviewPanel.classList.contains("-translate-x-full")) {
          setMobileBackdrop(false);
        }
      }

      function appendChatBubble(role, content, supportingPoints = [], followUps = []) {
        const wrapper = document.createElement("div");
        wrapper.className = role === "user" ? "flex justify-end" : "flex justify-start";

        const bubble = document.createElement("div");
        bubble.className = role === "user"
          ? "max-w-[85%] rounded-[1.5rem] rounded-tr-md border border-accent/20 bg-accent/10 px-4 py-3 text-sm leading-6 text-ink"
          : "max-w-[85%] rounded-[1.5rem] rounded-tl-md border border-line bg-black/40 px-4 py-3 text-sm leading-6 text-[#dbe8d3]";

        let html = `<div class="space-y-3">${renderMessageContent(content)}</div>`;
        if (supportingPoints.length) {
          html += `<div class="mt-3 space-y-2 text-muted border-t border-line/70 pt-3">`;
          supportingPoints.forEach((point) => {
            html += `<div>${escapeHtml(point)}</div>`;
          });
          html += `</div>`;
        }
        if (followUps.length) {
          html += `<div class="mt-4 flex flex-wrap gap-2">`;
          followUps.forEach((question) => {
            html += `<button type="button" data-question="${escapeHtml(question)}" class="followup-chip rounded-full border border-line bg-black/20 px-3 py-2 text-xs font-semibold text-muted transition hover:border-accent hover:text-accent">${escapeHtml(question)}</button>`;
          });
          html += `</div>`;
        }

        bubble.innerHTML = html;
        wrapper.appendChild(bubble);
        chatThread.appendChild(wrapper);
        scrollChatToBottom();
      }

      function clearChat() {
        chatThread.innerHTML = "";
        appendChatBubble(
          "assistant",
          "Ask about sleep, recovery, readiness, stress, activities, or longer-term patterns in your Garmin data.",
        );
        scrollChatToBottom(false);
      }

      function setActiveTab(tab) {
        const chatActive = tab === "chat";
        chatView.classList.toggle("hidden", !chatActive);
        analyticsView.classList.toggle("hidden", chatActive);
        clearChatButtonVisibility(chatActive);
        chatTabButton.className = chatActive
          ? "rounded-full bg-accent px-4 py-2 text-sm font-semibold text-black transition"
          : "rounded-full px-4 py-2 text-sm font-semibold text-muted transition hover:text-ink";
        analyticsTabButton.className = chatActive
          ? "rounded-full px-4 py-2 text-sm font-semibold text-muted transition hover:text-ink"
          : "rounded-full bg-accent px-4 py-2 text-sm font-semibold text-black transition";
      }

      function clearChatButtonVisibility(visible) {
        document.getElementById("clearChat").classList.toggle("hidden", !visible);
      }

      function notificationToneClasses(severity = "info") {
        if (severity === "positive") {
          return "bg-emerald-500/10";
        }
        if (severity === "caution") {
          return "bg-amber-400/10";
        }
        return "bg-black/20";
      }

      function renderNotifications(notifications = { active: [], history: [] }) {
        notificationList.innerHTML = "";
        notificationHistory.innerHTML = "";
        const unreadCount = notifications.active.length;
        notificationCount.textContent = String(unreadCount);
        notificationCount.classList.toggle("hidden", unreadCount === 0);

        if (!notifications.active.length) {
          notificationList.innerHTML = `<div class="px-1 py-2 text-sm text-muted">No unread overview notifications right now.</div>`;
        } else {
          notifications.active.forEach((item) => {
            const row = document.createElement("div");
            row.className = `rounded-[1.25rem] px-4 py-4 ${notificationToneClasses(item.severity)}`;
            row.innerHTML = `
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="text-sm font-bold text-ink">${escapeHtml(item.title)}</div>
                  <div class="mt-1 text-xs uppercase tracking-[0.2em] text-muted">${escapeHtml(formatDateRo(item.date))}</div>
                </div>
                <button
                  type="button"
                  data-dismiss-id="${escapeHtml(item.id)}"
                  class="rounded-full border border-line bg-black/20 px-3 py-1.5 text-xs font-semibold text-muted transition hover:border-accent hover:text-accent"
                >
                  Dismiss
                </button>
              </div>
              <p class="mt-3 text-sm leading-6 text-[#dbe8d3]">${escapeHtml(item.body)}</p>
            `;
            notificationList.appendChild(row);
          });
        }

        if (!notifications.history.length) {
          notificationHistory.innerHTML = `<div class="px-1 py-2 text-sm text-muted">Notification history will appear here as daily overviews accumulate.</div>`;
          return;
        }

        notifications.history.slice(0, 8).forEach((item) => {
          const row = document.createElement("div");
          row.className = "rounded-[1.25rem] bg-black/20 px-4 py-3";
          row.innerHTML = `
            <div class="flex items-center justify-between gap-3">
              <div class="text-sm font-semibold text-ink">${escapeHtml(item.title)}</div>
              <div class="text-xs uppercase tracking-[0.2em] text-muted">${escapeHtml(formatDateRo(item.date))}</div>
            </div>
            <p class="mt-2 text-sm leading-6 text-muted">${escapeHtml(item.body)}</p>
          `;
          notificationHistory.appendChild(row);
        });
      }

      function renderShortcutCard(card) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "w-full rounded-[1.5rem] border border-line bg-black/20 px-4 py-4 text-left transition hover:border-accent hover:bg-accentSoft";
        button.innerHTML = `
          <div class="text-xs uppercase tracking-[0.35em] text-accent">${escapeHtml(card.id)}</div>
          <div class="mt-2 text-lg font-bold text-ink">${escapeHtml(card.title)}</div>
          <div class="mt-2 text-sm leading-6 text-[#dbe8d3]">${escapeHtml(card.headline)}</div>
          <div class="mt-3 space-y-1 text-sm text-muted">
            ${(card.details || []).map((item) => `<div>${escapeHtml(item)}</div>`).join("")}
          </div>
        `;
        button.addEventListener("click", () => {
          chatInput.value = card.question;
          chatForm.requestSubmit();
        });
        return button;
      }

      function renderMetricRows(metrics = []) {
        metricList.innerHTML = "";
        metrics.forEach((item) => {
          const row = document.createElement("div");
          row.className = "flex items-center justify-between gap-4 rounded-[1rem] border border-line bg-black/20 px-3 py-2";
          row.innerHTML = `
            <div class="text-sm text-muted">${escapeHtml(item.label)}</div>
            <div class="text-sm text-right font-semibold text-ink">${escapeHtml(item.value)}</div>
          `;
          metricList.appendChild(row);
        });
      }

      function renderDeviceStatus(device = {}) {
        if (!device || (!device.name && !device.image_url && device.battery_percent == null)) {
          deviceChip.classList.add("hidden");
          deviceChip.classList.remove("flex");
          return;
        }

        if (device.image_url) {
          deviceChipImage.src = device.image_url;
          deviceChipImage.classList.remove("hidden");
        } else {
          deviceChipImage.classList.add("hidden");
        }

        deviceChipDot.className = "h-2.5 w-2.5 rounded-full bg-emerald-500";
        deviceChipLabel.textContent = device.name || "Current device";
        deviceChip.classList.remove("hidden");
        deviceChip.classList.add("flex");
      }

      function renderHistoryMeta(history = {}) {
        if (!history.available) {
          historyMeta.textContent = "Health-history sync is empty. Sync 12 months to enable wider sleep, stress, and recovery trends.";
          return;
        }

        const coverageStart = history.coverage_start || "unknown start";
        const latestDate = history.latest_date || "today";
        historyMeta.textContent = `${history.days_available} daily snapshots from ${formatDateRo(coverageStart)} to ${formatDateRo(latestDate)}.`;
      }

      function numericSeries(series = [], cutoff = 30) {
        return (series || [])
          .slice(-cutoff)
          .map((item) => ({
            date: item.date,
            value: Number(item.value),
          }))
          .filter((item) => Number.isFinite(item.value));
      }

      function average(values = []) {
        if (!values.length) {
          return null;
        }
        return values.reduce((sum, value) => sum + value, 0) / values.length;
      }

      function formatCompactNumber(value, maximumFractionDigits = 0) {
        if (value == null || !Number.isFinite(Number(value))) {
          return "n/a";
        }
        return new Intl.NumberFormat(navigator.language || "en-US", {
          maximumFractionDigits,
        }).format(Number(value));
      }

      function formatMetricValue(metricKey, value) {
        if (value == null || !Number.isFinite(Number(value))) {
          return "n/a";
        }
        const numeric = Number(value);
        if (metricKey === "steps") {
          return `${formatCompactNumber(numeric)} steps`;
        }
        if (metricKey === "sleep_score" || metricKey === "body_battery_current" || metricKey === "stress_avg" || metricKey === "training_readiness") {
          return formatCompactNumber(numeric);
        }
        if (metricKey === "resting_hr") {
          return `${formatCompactNumber(numeric)} bpm`;
        }
        if (metricKey === "weight_kg") {
          return `${formatCompactNumber(numeric, 1)} kg`;
        }
        if (metricKey === "vo2max") {
          return formatCompactNumber(numeric, 1);
        }
        if (metricKey === "hydration_ml") {
          return `${formatCompactNumber(numeric)} ml`;
        }
        return formatCompactNumber(numeric, 1);
      }

      function metricDirection(metricKey, delta) {
        if (delta == null || !Number.isFinite(delta)) {
          return {
            label: "Insufficient baseline",
            tone: "border-line text-muted",
            emphasis: "stable",
          };
        }

        const thresholds = {
          steps: 800,
          sleep_score: 3,
          body_battery_current: 4,
          stress_avg: 3,
          resting_hr: 2,
          weight_kg: 0.5,
          vo2max: 0.3,
          hydration_ml: 250,
        };
        const threshold = thresholds[metricKey] || 1;
        if (Math.abs(delta) < threshold) {
          return {
            label: "Close to baseline",
            tone: "border-line text-muted",
            emphasis: "stable",
          };
        }

        const lowerIsBetter = new Set(["stress_avg", "resting_hr"]);
        const improvement = lowerIsBetter.has(metricKey) ? delta < 0 : delta > 0;
        return {
          label: improvement ? "Trending better" : "Running softer",
          tone: improvement
            ? "border-emerald-500/20 bg-emerald-500/10 text-emerald-200"
            : "border-amber-400/20 bg-amber-400/10 text-amber-100",
          emphasis: improvement ? "up" : "down",
        };
      }

      function chunkSeries(series = [], maxBars = 12) {
        if (!series.length) {
          return [];
        }
        const bucketSize = Math.max(1, Math.ceil(series.length / maxBars));
        const buckets = [];
        for (let index = 0; index < series.length; index += bucketSize) {
          const slice = series.slice(index, index + bucketSize);
          buckets.push({
            date: slice[slice.length - 1]?.date,
            value: average(slice.map((item) => item.value)),
          });
        }
        return buckets.filter((item) => item.value != null);
      }

      function buildRangeBars(series = []) {
        const buckets = chunkSeries(series);
        if (!buckets.length) {
          return `<div class="rounded-[1rem] border border-line bg-black/20 px-3 py-3 text-sm text-muted">No readable history yet for this metric.</div>`;
        }
        const values = buckets.map((item) => item.value);
        const max = Math.max(...values);
        const min = Math.min(...values);
        const range = max - min || 1;

        return `
          <div class="rounded-[1rem] border border-line bg-black/20 px-3 py-3">
            <div class="flex h-28 items-end gap-2">
              ${buckets.map((item) => {
                const height = 22 + (((item.value - min) / range) * 78);
                return `
                  <div class="flex min-w-0 flex-1 flex-col items-center gap-2">
                    <div class="w-full rounded-full bg-accent/90" style="height:${height.toFixed(1)}px"></div>
                    <div class="text-[11px] text-muted">${escapeHtml(formatDateRo(item.date).slice(0, 5))}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      function metricNarrative(metricKey, label, latest, rangeAvg, baselineAvg, rangeMin, rangeMax) {
        const latestText = formatMetricValue(metricKey, latest);
        const avgText = formatMetricValue(metricKey, rangeAvg);
        const baselineText = baselineAvg == null ? null : formatMetricValue(metricKey, baselineAvg);
        const direction = metricDirection(metricKey, baselineAvg == null ? null : rangeAvg - baselineAvg);

        const intros = {
          steps: `You're currently at ${latestText}, and your ${activeAnalyticsRange} rhythm is ${avgText}.`,
          sleep_score: `Sleep quality is sitting at ${latestText} right now, with a ${activeAnalyticsRange} average of ${avgText}.`,
          body_battery_current: `Body Battery is ${latestText} today, and the broader ${activeAnalyticsRange} average is ${avgText}.`,
          stress_avg: `Stress is currently ${latestText}, with a ${activeAnalyticsRange} average of ${avgText}.`,
          resting_hr: `Resting HR is ${latestText}, and your ${activeAnalyticsRange} average is ${avgText}.`,
          weight_kg: `Weight is ${latestText} on the latest snapshot, with a ${activeAnalyticsRange} average of ${avgText}.`,
          vo2max: `VO2 max is ${latestText} on the latest available day, with a ${activeAnalyticsRange} average of ${avgText}.`,
          hydration_ml: `Hydration is ${latestText} on the latest day, and your ${activeAnalyticsRange} average is ${avgText}.`,
        };

        const implications = {
          steps: direction.emphasis === "up"
            ? "Daily movement is running above your usual rhythm, so overall activity load looks stronger than baseline."
            : direction.emphasis === "down"
              ? "Daily movement is below your normal rhythm, which usually means your day-to-day activity load has softened."
              : "Movement is broadly holding near baseline, so nothing major is breaking away.",
          sleep_score: direction.emphasis === "up"
            ? "Sleep has been supporting recovery better than usual over this window."
            : direction.emphasis === "down"
              ? "Sleep quality has been softer than your normal baseline, so recovery may be less robust."
              : "Sleep is holding close to baseline without a strong directional shift.",
          body_battery_current: direction.emphasis === "up"
            ? "Energy reserves have generally been stronger than your baseline."
            : direction.emphasis === "down"
              ? "Energy reserves have been below your baseline, which usually means recovery has been less complete."
              : "Body Battery is behaving close to your baseline lately.",
          stress_avg: direction.emphasis === "up"
            ? "Stress has been elevated versus baseline, so your system looks more taxed than usual."
            : direction.emphasis === "down"
              ? "Stress has been calmer than baseline, which is usually favorable for recovery."
              : "Stress is close to your normal range right now.",
          resting_hr: direction.emphasis === "up"
            ? "Resting HR is running high enough to suggest more accumulated strain than usual."
            : direction.emphasis === "down"
              ? "Resting HR is below baseline, which usually points to a fresher recovery state."
              : "Resting HR is broadly stable versus baseline.",
          weight_kg: direction.emphasis === "up"
            ? "Body weight is trending higher than your recent norm."
            : direction.emphasis === "down"
              ? "Body weight is trending lower than your recent norm."
              : "Body weight is fairly stable against recent history.",
          vo2max: direction.emphasis === "up"
            ? "Aerobic fitness is trending a little better than your baseline."
            : direction.emphasis === "down"
              ? "Aerobic fitness has softened compared with your baseline."
              : "VO2 max is holding fairly close to baseline.",
          hydration_ml: direction.emphasis === "up"
            ? "Hydration intake has been stronger than your usual recent level."
            : direction.emphasis === "down"
              ? "Hydration intake has been softer than your usual recent level."
              : "Hydration is roughly in line with your recent norm.",
        };

        const baselineLine = baselineText
          ? ` Against your 30-day baseline of ${baselineText}, this reads as ${direction.label.toLowerCase()}.`
          : " There still isn't enough 30-day history to call a strong baseline.";

        return `${intros[metricKey] || `${label} is currently ${latestText}.`}${baselineLine} ${implications[metricKey] || ""} Window range: ${formatMetricValue(metricKey, rangeMin)} to ${formatMetricValue(metricKey, rangeMax)}.`;
      }

      function renderAnalytics(analytics = {}) {
        analyticsPayload = analytics;
        const rangeOrder = { "7d": 7, "30d": 30, "90d": 90, "12m": 366 };
        const cutoff = rangeOrder[activeAnalyticsRange] || 30;
        analyticsMeta.textContent = analytics.days_available
          ? `History synced: ${analytics.days_available} days through ${formatDateRo(analytics.latest_date)}`
          : "Sync more history to unlock analytics.";

        analyticsInsights.innerHTML = "";
        (analytics.insights || []).slice(0, 4).forEach((insight) => {
          const card = document.createElement("div");
          card.className = "rounded-[1.25rem] border border-line bg-black/20 px-4 py-4 text-sm leading-7 text-[#dbe8d3]";
          card.textContent = insight;
          analyticsInsights.appendChild(card);
        });
        if (!analyticsInsights.children.length) {
          analyticsInsights.innerHTML = `<div class="rounded-[1.25rem] border border-line bg-black/20 px-4 py-4 text-sm text-muted">No strong pattern stands out yet. Sync more history to make the analytics read sharper.</div>`;
        }

        const metricCards = [
          ["steps", "Steps"],
          ["sleep_score", "Sleep score"],
          ["body_battery_current", "Body Battery"],
          ["stress_avg", "Stress"],
          ["resting_hr", "Resting HR"],
          ["weight_kg", "Weight"],
          ["vo2max", "VO2 max"],
          ["hydration_ml", "Hydration"],
        ];
        analyticsCharts.innerHTML = "";
        metricCards.forEach(([key, label]) => {
          const fullSeries = (analytics.series?.[key] || [])
            .map((item) => ({ date: item.date, value: Number(item.value) }))
            .filter((item) => Number.isFinite(item.value));
          const rangeSeries = numericSeries(fullSeries, cutoff);
          const baselineSeries = numericSeries(fullSeries, Math.min(30, fullSeries.length || 30));

          const card = document.createElement("div");
          card.className = "rounded-[1.5rem] border border-line bg-black/20 p-4 md:p-5";

          if (!rangeSeries.length) {
            card.innerHTML = `
              <div class="flex items-center justify-between gap-3">
                <div class="text-base font-semibold text-ink">${escapeHtml(label)}</div>
                <div class="rounded-full border border-line px-3 py-1 text-xs font-semibold text-muted">No data</div>
              </div>
              <div class="mt-4 text-sm leading-7 text-muted">There isn't enough synced history yet to read this metric in a useful way.</div>
            `;
            analyticsCharts.appendChild(card);
            return;
          }

          const values = rangeSeries.map((item) => item.value);
          const latest = values[values.length - 1];
          const rangeAvg = average(values);
          const baselineAvg = average(baselineSeries.map((item) => item.value));
          const rangeMin = Math.min(...values);
          const rangeMax = Math.max(...values);
          const previousValues = fullSeries
            .slice(Math.max(0, fullSeries.length - (rangeSeries.length * 2)), Math.max(0, fullSeries.length - rangeSeries.length))
            .map((item) => item.value);
          const previousAvg = average(previousValues);
          const direction = metricDirection(key, previousAvg == null ? (baselineAvg == null ? null : rangeAvg - baselineAvg) : rangeAvg - previousAvg);

          card.innerHTML = `
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="text-base font-semibold text-ink">${escapeHtml(label)}</div>
                <div class="mt-2 text-3xl font-bold text-ink">${escapeHtml(formatMetricValue(key, latest))}</div>
              </div>
              <div class="rounded-full border px-3 py-1 text-xs font-semibold ${direction.tone}">${escapeHtml(direction.label)}</div>
            </div>
            <p class="mt-4 text-sm leading-7 text-[#dbe8d3]">${escapeHtml(metricNarrative(key, label, latest, rangeAvg, baselineAvg, rangeMin, rangeMax))}</p>
            <div class="mt-4 grid gap-2 sm:grid-cols-2">
              <div class="rounded-[1rem] border border-line bg-black/20 px-3 py-3">
                <div class="text-[11px] uppercase tracking-[0.25em] text-muted">Window average</div>
                <div class="mt-2 text-sm font-semibold text-ink">${escapeHtml(formatMetricValue(key, rangeAvg))}</div>
              </div>
              <div class="rounded-[1rem] border border-line bg-black/20 px-3 py-3">
                <div class="text-[11px] uppercase tracking-[0.25em] text-muted">30d baseline</div>
                <div class="mt-2 text-sm font-semibold text-ink">${escapeHtml(formatMetricValue(key, baselineAvg))}</div>
              </div>
              <div class="rounded-[1rem] border border-line bg-black/20 px-3 py-3">
                <div class="text-[11px] uppercase tracking-[0.25em] text-muted">Window low</div>
                <div class="mt-2 text-sm font-semibold text-ink">${escapeHtml(formatMetricValue(key, rangeMin))}</div>
              </div>
              <div class="rounded-[1rem] border border-line bg-black/20 px-3 py-3">
                <div class="text-[11px] uppercase tracking-[0.25em] text-muted">Window high</div>
                <div class="mt-2 text-sm font-semibold text-ink">${escapeHtml(formatMetricValue(key, rangeMax))}</div>
              </div>
            </div>
            <div class="mt-4">
              ${buildRangeBars(rangeSeries)}
            </div>
          `;
          analyticsCharts.appendChild(card);
        });
      }

      async function loadShortcuts() {
        setMessage("Loading shortcut summaries...", "neutral");
        analyticsPayload = null;
        shortcutList.innerHTML = `<div class="rounded-[1.5rem] border border-line bg-black/20 px-4 py-4 text-sm text-muted">Loading shortcuts...</div>`;
        try {
          const response = await fetch("/api/shortcuts");
          const data = await safeJson(response);
          const shortcuts = data.shortcuts;
          renderHistoryMeta(data.history || {});
          renderNotifications(data.notifications || {});
          renderDeviceStatus(shortcuts.device_status || {});

          shortcutList.innerHTML = "";
          renderMetricRows(shortcuts.current_metrics || []);
          shortcuts.cards.forEach((card) => shortcutList.appendChild(renderShortcutCard(card)));
          setWarnings(shortcuts.warnings || []);
          setMessage("Dashboard ready.", "success");
        } catch (error) {
          shortcutList.innerHTML = `<div class="rounded-[1.5rem] border border-red-500/20 bg-red-500/10 px-4 py-4 text-sm text-danger">${escapeHtml(error.message)}</div>`;
          metricList.innerHTML = "";
          notificationList.innerHTML = "";
          notificationHistory.innerHTML = "";
          setWarnings([]);
          renderHistoryMeta({});
          setMessage(error.message, "error");
        }
      }

      async function loadAnalytics() {
        try {
          const response = await fetch("/api/analytics");
          const data = await safeJson(response);
          renderAnalytics(data.analytics || {});
        } catch (error) {
          analyticsMeta.textContent = error.message;
        }
      }

      async function askQuestion(question) {
        const trimmed = question.trim();
        if (!trimmed) {
          return;
        }
        const isRomanian = /[ăâîșşțţ]|\b(cum|azi|somn|stres|recuperare|antrenament|trend|ultimele)\b/i.test(trimmed);

        appendChatBubble("user", trimmed);
        chatInput.value = "";
        sendButton.disabled = true;
        setMessage(isRomanian ? "Analizez datele tale Garmin..." : "Looking through your Garmin data...", "neutral");

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: trimmed }),
          });
          const data = await safeJson(response);
          const payload = data.response;
          appendChatBubble("assistant", payload.answer, payload.supporting_points || [], payload.follow_ups || []);
          setWarnings(payload.warnings || []);
          renderHistoryMeta(data.history || {});
          setMessage(isRomanian ? "Răspunsul este gata." : "Answer ready.", "success");
        } catch (error) {
          appendChatBubble("assistant", error.message);
          setMessage(error.message, "error");
        } finally {
          sendButton.disabled = false;
        }
      }

      async function syncHistoryInBatches(totalDays = 365, batchSize = 45) {
        let offsetDays = 0;
        let savedDays = 0;

        while (offsetDays < totalDays) {
          const currentBatch = Math.min(batchSize, totalDays - offsetDays);
          setMessage(`Syncing Garmin history ${offsetDays + 1}-${offsetDays + currentBatch} of ${totalDays} days...`, "neutral");
          const response = await fetch("/api/history/sync", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ days: currentBatch, offset_days: offsetDays }),
          });
          const data = await safeJson(response);
          savedDays += data.saved_days || 0;
          renderHistoryMeta(data.history || {});
          offsetDays += currentBatch;
        }

        return savedDays;
      }

      chatThread.addEventListener("click", (event) => {
        const button = event.target.closest(".followup-chip");
        if (!button) {
          return;
        }
        chatInput.value = button.dataset.question || "";
        chatForm.requestSubmit();
      });

      overviewToggle.addEventListener("click", openOverviewPanel);
      closeOverviewButton.addEventListener("click", closeOverviewPanel);
      notificationToggle.addEventListener("click", openNotificationPanel);
      closeNotificationsButton.addEventListener("click", closeNotificationPanel);
      mobileBackdrop.addEventListener("click", () => {
        closeOverviewPanel();
        closeNotificationPanel();
      });
      chatTabButton.addEventListener("click", () => setActiveTab("chat"));
      analyticsTabButton.addEventListener("click", async () => {
        setActiveTab("analytics");
        if (!analyticsPayload) {
          await loadAnalytics();
        } else {
          renderAnalytics(analyticsPayload);
        }
      });
      document.querySelectorAll(".analytics-range").forEach((button) => {
        button.addEventListener("click", () => {
          activeAnalyticsRange = button.dataset.range;
          document.querySelectorAll(".analytics-range").forEach((item) => {
            item.className = item.dataset.range === activeAnalyticsRange
              ? "analytics-range rounded-full bg-accent px-3 py-1.5 text-xs font-semibold text-black"
              : "analytics-range rounded-full px-3 py-1.5 text-xs font-semibold text-muted transition hover:text-ink";
          });
          if (analyticsPayload) {
            renderAnalytics(analyticsPayload);
          }
        });
      });

      notificationList.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-dismiss-id]");
        if (!button) {
          return;
        }

        const notificationId = button.dataset.dismissId;
        try {
          const response = await fetch(`/api/notifications/${encodeURIComponent(notificationId)}/dismiss`, {
            method: "POST",
          });
          const data = await safeJson(response);
          renderNotifications(data.notifications || {});
          setMessage("Notification archived.", "success");
        } catch (error) {
          setMessage(error.message, "error");
        }
      });

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await askQuestion(chatInput.value);
      });

      document.getElementById("clearChat").addEventListener("click", () => {
        clearChat();
        setMessage("Chat cleared.", "neutral");
      });

      syncHistoryButton.addEventListener("click", async () => {
        syncHistoryButton.disabled = true;
        try {
          const savedDays = await syncHistoryInBatches(365, 45);
          await loadShortcuts();
          setMessage(`History synced. Saved ${savedDays} day(s).`, "success");
        } catch (error) {
          setMessage(error.message, "error");
        } finally {
          syncHistoryButton.disabled = false;
        }
      });

      refreshOverviewButton.addEventListener("click", async () => {
        refreshOverviewButton.disabled = true;
        try {
          await loadShortcuts();
          setMessage("Current Garmin data refreshed.", "success");
        } catch (error) {
          setMessage(error.message, "error");
        } finally {
          refreshOverviewButton.disabled = false;
        }
      });

      logoutButton.addEventListener("click", async () => {
        try {
          const response = await fetch("/api/logout", { method: "POST" });
          await safeJson(response);
          window.location.assign("/");
        } catch (error) {
          setMessage(error.message, "error");
        }
      });

      clearChat();
      setActiveTab("chat");
      loadShortcuts();
    </script>
  </body>
</html>
