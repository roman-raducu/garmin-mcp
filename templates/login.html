<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garmin Chat Connector | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
            },
            colors: {
              pitch: "#060805",
              panel: "#0c100b",
              line: "#232b1f",
              ink: "#eff5eb",
              muted: "#8e9b87",
              accent: "#b8ff5a",
              accentDeep: "#6f9f21",
              danger: "#ff8b8b",
            },
            boxShadow: {
              glow: "0 0 0 1px rgba(184,255,90,0.12), 0 30px 90px rgba(0,0,0,0.45)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-pitch font-sans text-ink">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(184,255,90,0.14),_transparent_28%),linear-gradient(180deg,_#050704,_#090b08_55%,_#050704)]"></div>
    <div class="absolute inset-0 -z-10 bg-[linear-gradient(rgba(184,255,90,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(184,255,90,0.05)_1px,transparent_1px)] bg-[size:40px_40px] [mask-image:linear-gradient(180deg,white,transparent_80%)]"></div>

    <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-5 py-8">
      <section class="grid w-full max-w-5xl overflow-hidden rounded-[2rem] border border-line bg-panel/90 shadow-glow backdrop-blur lg:grid-cols-[0.95fr_1.05fr]">
        <div class="hidden border-r border-line bg-[linear-gradient(180deg,rgba(184,255,90,0.08),rgba(184,255,90,0.02))] p-10 lg:flex lg:flex-col lg:justify-between">
          <div>
            <div class="mb-8 inline-flex h-12 w-12 items-center justify-center rounded-2xl border border-accent/25 bg-accent/10 text-sm font-bold text-accent">
              GC
            </div>
            <p class="text-xs uppercase tracking-[0.45em] text-muted">Garmin Chat</p>
            <h1 class="mt-5 max-w-sm text-5xl font-bold leading-tight text-ink">
              Sign in. Pass MFA. Get to the data.
            </h1>
          </div>
          <div class="space-y-3 text-sm text-muted">
            <div class="rounded-2xl border border-accent/10 bg-black/20 px-4 py-3">No landing-page filler.</div>
            <div class="rounded-2xl border border-accent/10 bg-black/20 px-4 py-3">Session starts here, dashboard after auth.</div>
          </div>
        </div>

        <div class="p-6 sm:p-8 lg:p-10">
          <div class="mx-auto w-full max-w-md">
            <div class="mb-8 lg:hidden">
              <div class="mb-5 inline-flex h-12 w-12 items-center justify-center rounded-2xl border border-accent/25 bg-accent/10 text-sm font-bold text-accent">
                GC
              </div>
              <p class="text-xs uppercase tracking-[0.45em] text-muted">Garmin Chat</p>
              <h1 class="mt-4 text-4xl font-bold leading-tight">Sign in</h1>
            </div>

            <div class="mb-8 hidden lg:block">
              <p class="text-xs uppercase tracking-[0.45em] text-muted">Secure Session</p>
              <h2 class="mt-4 text-4xl font-bold leading-tight">Connect your Garmin account</h2>
            </div>

            <form id="loginForm" class="space-y-4">
              <div>
                <label for="email" class="mb-2 block text-sm font-medium text-ink">Garmin email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  required
                  class="w-full rounded-2xl border border-line bg-black/20 px-4 py-3 text-ink outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/10"
                  placeholder="you@example.com"
                />
              </div>
              <div>
                <label for="password" class="mb-2 block text-sm font-medium text-ink">Garmin password</label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  required
                  class="w-full rounded-2xl border border-line bg-black/20 px-4 py-3 text-ink outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/10"
                  placeholder="Your Garmin password"
                />
              </div>
              <button
                type="submit"
                class="w-full rounded-2xl bg-accent px-4 py-3 text-sm font-bold text-black transition hover:brightness-105"
              >
                Connect Garmin
              </button>
            </form>

            <form id="mfaForm" class="mt-5 hidden space-y-4 rounded-[1.75rem] border border-accent/20 bg-accent/6 p-4">
              <div class="text-sm leading-6 text-muted">
                Enter the Garmin MFA code to continue to the dashboard.
              </div>
              <div>
                <label for="mfaCode" class="mb-2 block text-sm font-medium text-ink">MFA code</label>
                <input
                  id="mfaCode"
                  name="code"
                  inputmode="numeric"
                  autocomplete="one-time-code"
                  class="w-full rounded-2xl border border-line bg-black/20 px-4 py-3 text-ink outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/10"
                  placeholder="123456"
                />
              </div>
              <button
                type="submit"
                class="w-full rounded-2xl bg-accent px-4 py-3 text-sm font-bold text-black transition hover:brightness-105"
              >
                Verify MFA
              </button>
            </form>

            <p id="messageBox" class="mt-5 min-h-[3rem] rounded-[1.5rem] border border-line bg-black/20 px-4 py-3 text-sm leading-6 text-muted">
              Sign in to continue.
            </p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const loginForm = document.getElementById("loginForm");
      const mfaForm = document.getElementById("mfaForm");
      const messageBox = document.getElementById("messageBox");
      const mfaCodeInput = document.getElementById("mfaCode");
      let pendingId = null;

      function setMessage(text, tone = "neutral") {
        const tones = {
          neutral: "border border-line bg-black/20 text-muted",
          success: "border border-accent/20 bg-accent/10 text-accent",
          warning: "border border-accent/20 bg-accent/8 text-accent",
          error: "border border-red-500/20 bg-red-500/10 text-danger",
        };
        messageBox.className = `mt-5 min-h-[3rem] rounded-[1.5rem] px-4 py-3 text-sm leading-6 ${tones[tone] || tones.neutral}`;
        messageBox.textContent = text;
      }

      async function safeJson(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || data.message || "Request failed.");
        }
        return data;
      }

      async function hydrateSessionState() {
        const response = await fetch("/api/session");
        const data = await safeJson(response);

        if (data.connected) {
          window.location.replace("/dashboard");
          return;
        }

        if (data.pending_mfa && data.pending) {
          pendingId = data.pending.pending_id;
          mfaForm.classList.remove("hidden");
          setMessage("MFA requested. Enter the code to continue.", "warning");
        }
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage("Connecting to Garmin...", "neutral");

        const payload = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };

        try {
          const response = await fetch("/api/connect", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json().catch(() => ({}));

          if (response.status === 202 && data.status === "mfa_required") {
            pendingId = data.pending_id;
            mfaForm.classList.remove("hidden");
            setMessage("MFA requested. Enter the code to continue.", "warning");
            return;
          }

          if (!response.ok) {
            throw new Error(data.detail || "Garmin sign-in failed.");
          }

          setMessage("Connected. Opening dashboard...", "success");
          window.location.assign("/dashboard");
        } catch (error) {
          setMessage(error.message, "error");
        }
      });

      mfaForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!pendingId) {
          setMessage("MFA session expired. Start sign-in again.", "error");
          return;
        }

        setMessage("Verifying MFA code...", "neutral");

        try {
          const response = await fetch("/api/connect/mfa", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              pending_id: pendingId,
              code: mfaCodeInput.value,
            }),
          });
          await safeJson(response);
          setMessage("Connected. Opening dashboard...", "success");
          window.location.assign("/dashboard");
        } catch (error) {
          setMessage(error.message, "error");
        }
      });

      hydrateSessionState().catch((error) => {
        setMessage(error.message, "error");
      });
    </script>
  </body>
</html>
